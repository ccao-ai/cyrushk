<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30天小托福词汇挑战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-pill { background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px; color: white; font-size: 0.9rem; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .day-selector { text-align: center; }
        .day-selector h2 { color: #333; margin-bottom: 20px; }
        .day-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 20px 0; }
        .day-btn { aspect-ratio: 1; border: 2px solid #e0e0e0; background: white; border-radius: 12px; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.85rem; }
        .day-btn:hover { border-color: #667eea; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
        .day-btn.completed { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); border-color: #22c55e; color: white; }
        .day-btn.current { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: #667eea; color: white; }
        .day-btn.locked { opacity: 0.5; cursor: not-allowed; }
        .day-number { font-size: 1.2rem; font-weight: 700; }
        .day-label { font-size: 0.7rem; margin-top: 2px; }
        .mode-selection { display: flex; gap: 15px; justify-content: center; margin: 30px 0; }
        .mode-card { flex: 1; max-width: 200px; padding: 25px; border: 2px solid #e0e0e0; border-radius: 15px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .mode-card:hover { border-color: #667eea; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2); }
        .mode-card .icon { font-size: 3rem; margin-bottom: 10px; }
        .mode-card h3 { color: #333; margin-bottom: 5px; }
        .mode-card p { color: #666; font-size: 0.85rem; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .quiz-header h2 { color: #333; }
        .back-btn { background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; color: #666; }
        .progress-info { text-align: center; color: #667eea; font-weight: 600; margin-bottom: 15px; }
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 8px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s ease; }
        .word-card { text-align: center; padding: 20px; }
        .word-image { width: 120px; height: 120px; margin: 0 auto 20px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 60px; box-shadow: 0 10px 30px rgba(240, 147, 251, 0.3); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .word-display { font-size: 2.2rem; color: #333; margin: 15px 0 5px; font-weight: 700; }
        .phonetic { color: #888; font-size: 1.1rem; margin-bottom: 20px; }
        .meaning { font-size: 1.3rem; color: #667eea; margin-bottom: 25px; padding: 15px; background: #f8f9fa; border-radius: 10px; }
        .study-controls { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .options { display: grid; gap: 12px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px 20px; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem; }
        .option:hover { background: #e9ecef; border-color: #667eea; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; }
        .option.disabled { pointer-events: none; }
        .result-screen { text-align: center; }
        .score-circle { width: 150px; height: 150px; margin: 20px auto; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; font-weight: 700; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4); }
        .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; }
        .result-stat { background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .result-stat .number { font-size: 1.5rem; font-weight: 700; color: #667eea; }
        .result-stat .label { color: #666; font-size: 0.85rem; }
        .wrong-words { margin-top: 25px; text-align: left; }
        .wrong-words h3 { color: #333; margin-bottom: 15px; }
        .word-list { display: grid; gap: 8px; max-height: 200px; overflow-y: auto; }
        .word-item { background: #f8f9fa; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .word-item .emoji { font-size: 1.5rem; }
        .word-item .word { font-weight: 600; color: #333; }
        .word-item .phonetic { color: #888; font-size: 0.85rem; margin: 0; }
        .word-item .meaning { color: #666; font-size: 0.9rem; margin: 0; padding: 0; background: none; }
        .hidden { display: none !important; }
        @media (max-width: 600px) {
            .day-grid { grid-template-columns: repeat(5, 1fr); }
            .mode-selection { flex-direction: column; align-items: center; }
            .mode-card { width: 100%; max-width: 250px; }
            .card { padding: 20px; }
            .word-display { font-size: 1.8rem; }
            .result-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 30天小托福词汇挑战</h1>
            <p>1500个高频词汇 · 每天50词</p>
        </div>
        <div class="stats-bar">
            <div class="stat-pill">📅 已完成: <span id="completedDays">0</span>/30 天</div>
            <div class="stat-pill">📝 已掌握: <span id="masteredWords">0</span>/1500 词</div>
            <div class="stat-pill">🔥 连续学习: <span id="streak">0</span> 天</div>
        </div>
        <div class="card">
            <div id="daySelector" class="day-selector">
                <h2>选择学习天数 📅</h2>
                <div class="day-grid" id="dayGrid"></div>
                <div class="mode-selection hidden" id="modeSelection">
                    <div class="mode-card" onclick="selectMode('study')">
                        <div class="icon">📖</div>
                        <h3>学习模式</h3>
                        <p>浏览50个单词<br>配图记忆</p>
                    </div>
                    <div class="mode-card" onclick="selectMode('quiz')">
                        <div class="icon">📝</div>
                        <h3>测验模式</h3>
                        <p>50题挑战<br>检验掌握</p>
                    </div>
                </div>
            </div>
            <div id="quizScreen" class="hidden">
                <div class="quiz-header">
                    <h2>Day <span id="currentDay">1</span> - <span id="quizModeText">学习模式</span></h2>
                    <button class="back-btn" onclick="backToMenu()">↩ 返回</button>
                </div>
                <div class="progress-info">第 <span id="currentQuestion">1</span> / <span id="totalQuestions">50</span> 词</div>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <div class="word-card">
                    <div class="word-image" id="wordImage">🎯</div>
                    <div class="word-display" id="wordDisplay">Ready?</div>
                    <div class="phonetic" id="wordPhonetic"></div>
                    <div class="meaning hidden" id="wordMeaning"></div>
                </div>
                <div class="study-controls" id="studyControls">
                    <button class="btn btn-secondary" onclick="showMeaning()">👁 显示释义</button>
                    <button class="btn btn-primary" onclick="nextWord()">下一个 ➡️</button>
                </div>
                <div class="options hidden" id="quizOptions"></div>
            </div>
            <div id="resultScreen" class="result-screen hidden">
                <h2>🎉 Day <span id="resultDay">1</span> 完成!</h2>
                <div class="score-circle" id="scoreCircle">85%</div>
                <div class="result-stats">
                    <div class="result-stat"><div class="number" id="correctCount">42</div><div class="label">正确</div></div>
                    <div class="result-stat"><div class="number" id="wrongCount">8</div><div class="label">错误</div></div>
                    <div class="result-stat"><div class="number" id="timeSpent">5:30</div><div class="label">用时</div></div>
                </div>
                <div class="wrong-words" id="wrongWordsSection">
                    <h3>📝 需要复习的单词</h3>
                    <div class="word-list" id="wrongWordsList"></div>
                </div>
                <div style="margin-top: 25px;">
                    <button class="btn btn-primary" onclick="continueNextDay()">继续下一天 ➡️</button>
                    <button class="btn btn-secondary" onclick="backToMenu()">返回主页</button>
                </div>
            </div>
        </div>
    </div>
    <script src="vocabulary_30days_full.js"></script>
    <script>
        let appState = {
            currentDay: 1, mode: null, currentWordIndex: 0, words: [],
            correct: 0, wrong: [], startTime: null,
            completedDays: JSON.parse(localStorage.getItem('tj_completedDays') || '[]'),
            streak: parseInt(localStorage.getItem('tj_streak') || '0'),
            masteredWords: JSON.parse(localStorage.getItem('tj_masteredWords') || '[]')
        };
        function init() {
            renderDayGrid();
            updateStats();
        }
        function renderDayGrid() {
            const grid = document.getElementById('dayGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const btn = document.createElement('div');
                btn.className = 'day-btn';
                if (appState.completedDays.includes(i)) {
                    btn.classList.add('completed');
                    btn.innerHTML = `<div class="day-number">${i}</div><div class="day-label">✓</div>`;
                } else if (i === getNextDay()) {
                    btn.classList.add('current');
                    btn.innerHTML = `<div class="day-number">${i}</div><div class="day-label">当前</div>`;
                } else if (i > getNextDay()) {
                    btn.classList.add('locked');
                    btn.innerHTML = `<div class="day-number">${i}</div><div class="day-label">🔒</div>`;
                } else {
                    btn.innerHTML = `<div class="day-number">${i}</div><div class="day-label">可学</div>`;
                }
                btn.onclick = () => selectDay(i);
                grid.appendChild(btn);
            }
        }
        function getNextDay() {
            if (appState.completedDays.length === 0) return 1;
            return Math.max(...appState.completedDays) + 1;
        }
        function selectDay(day) {
            if (day > getNextDay()) { alert('请先完成前面的天数！'); return; }
            appState.currentDay = day;
            document.getElementById('modeSelection').classList.remove('hidden');
            document.getElementById('modeSelection').scrollIntoView({ behavior: 'smooth' });
        }
        function selectMode(mode) {
            appState.mode = mode;
            appState.currentWordIndex = 0;
            appState.correct = 0;
            appState.wrong = [];
            appState.startTime = Date.now();
            loadDayWords(appState.currentDay);
            document.getElementById('daySelector').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('currentDay').textContent = appState.currentDay;
            document.getElementById('quizModeText').textContent = mode === 'study' ? '学习模式' : '测验模式';
            document.getElementById('totalQuestions').textContent = appState.words.length;
            if (mode === 'study') {
                document.getElementById('studyControls').classList.remove('hidden');
                document.getElementById('quizOptions').classList.add('hidden');
                document.getElementById('wordMeaning').classList.add('hidden');
            } else {
                document.getElementById('studyControls').classList.add('hidden');
                document.getElementById('quizOptions').classList.remove('hidden');
            }
            showWord();
        }
        function loadDayWords(day) {
            const dayKey = 'day' + day;
            if (typeof VOCABULARY_30_DAYS !== 'undefined' && VOCABULARY_30_DAYS[dayKey]) {
                appState.words = [...VOCABULARY_30_DAYS[dayKey]];
            } else {
                // 备用数据
                appState.words = Array.from({length: 50}, (_, i) => ({
                    word: `Day${day}_Word${i+1}`, phonetic: '/fəˈnetɪk/', meaning: `第${day}天第${i+1}个单词释义`, emoji: '📚'
                }));
            }
        }
        function showWord() {
            const word = appState.words[appState.currentWordIndex];
            const progress = ((appState.currentWordIndex + 1) / appState.words.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('currentQuestion').textContent = appState.currentWordIndex + 1;
            document.getElementById('wordImage').textContent = word.emoji;
            document.getElementById('wordDisplay').textContent = word.word;
            document.getElementById('wordPhonetic').textContent = word.phonetic;
            document.getElementById('wordMeaning').textContent = word.meaning;
            if (appState.mode === 'study') {
                document.getElementById('wordMeaning').classList.add('hidden');
            } else {
                generateQuizOptions(word);
            }
        }
        function showMeaning() { document.getElementById('wordMeaning').classList.remove('hidden'); }
        function nextWord() {
            appState.currentWordIndex++;
            if (appState.currentWordIndex < appState.words.length) showWord();
            else finishDay();
        }
        function generateQuizOptions(correctWord) {
            const options = [correctWord.meaning];
            const otherWords = appState.words.filter(w => w.word !== correctWord.word);
            const distractors = shuffleArray(otherWords).slice(0, 3).map(w => w.meaning);
            options.push(...distractors);
            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            shuffleArray(options).forEach(option => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(btn, option, correctWord.meaning);
                container.appendChild(btn);
            });
        }
        function checkAnswer(btn, selected, correct) {
            document.querySelectorAll('.option').forEach(b => b.classList.add('disabled'));
            const currentWord = appState.words[appState.currentWordIndex];
            if (selected === correct) {
                btn.classList.add('correct');
                appState.correct++;
                if (!appState.masteredWords.includes(currentWord.word)) {
                    appState.masteredWords.push(currentWord.word);
                }
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.option').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
                appState.wrong.push(currentWord);
            }
            setTimeout(() => { appState.currentWordIndex++; if (appState.currentWordIndex < appState.words.length) showWord(); else finishDay(); }, 1200);
        }
        function finishDay() {
            if (!appState.completedDays.includes(appState.currentDay)) {
                appState.completedDays.push(appState.currentDay);
                localStorage.setItem('tj_completedDays', JSON.stringify(appState.completedDays));
                localStorage.setItem('tj_masteredWords', JSON.stringify(appState.masteredWords));
                updateStreak();
            }
            const timeSpent = Math.floor((Date.now() - appState.startTime) / 1000);
            const minutes = Math.floor(timeSpent / 60), seconds = timeSpent % 60;
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            const percentage = Math.round((appState.correct / appState.words.length) * 100);
            document.getElementById('resultDay').textContent = appState.currentDay;
            document.getElementById('scoreCircle').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = appState.correct;
            document.getElementById('wrongCount').textContent = appState.wrong.length;
            document.getElementById('timeSpent').textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;
            const wrongList = document.getElementById('wrongWordsList');
            if (appState.wrong.length > 0) {
                wrongList.innerHTML = appState.wrong.map(w => `
                    <div class="word-item">
                        <div class="emoji">${w.emoji}</div>
                        <div class="word-info">
                            <div class="word">${w.word} <span class="phonetic">${w.phonetic}</span></div>
                            <div class="meaning">${w.meaning}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('wrongWordsSection').innerHTML = '<h3>🎉 太棒了！全对！</h3>';
            }
            updateStats();
        }
        function updateStreak() {
            const today = new Date().toDateString();
            const lastStudy = localStorage.getItem('tj_lastStudy');
            if (lastStudy) {
                const lastDate = new Date(lastStudy);
                const diffDays = Math.floor((new Date() - lastDate) / (1000 * 60 * 60 * 24));
                if (diffDays === 1) appState.streak++;
                else if (diffDays > 1) appState.streak = 1;
            } else {
                appState.streak = 1;
            }
            localStorage.setItem('tj_streak', appState.streak);
            localStorage.setItem('tj_lastStudy', today);
        }
        function updateStats() {
            document.getElementById('completedDays').textContent = appState.completedDays.length;
            document.getElementById('masteredWords').textContent = appState.masteredWords.length;
            document.getElementById('streak').textContent = appState.streak;
        }
        function continueNextDay() {
            const nextDay = appState.currentDay + 1;
            if (nextDay <= 30) {
                selectDay(nextDay);
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('daySelector').classList.remove('hidden');
                document.getElementById('modeSelection').classList.remove('hidden');
            } else {
                alert('🎉 恭喜！你已完成全部30天挑战！');
                backToMenu();
            }
        }
        function backToMenu() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('daySelector').classList.remove('hidden');
            document.getElementById('modeSelection').classList.add('hidden');
            renderDayGrid();
        }
        function shuffleArray(array) { return [...array].sort(() => Math.random() - 0.5); }
        init();
    </script>
</body>
</html>
