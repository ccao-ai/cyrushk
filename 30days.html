<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30天小托福词汇挑战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 2rem; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .stats-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-pill {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .day-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .day-btn {
            aspect-ratio: 1;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        .day-btn:hover { border-color: #667eea; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(102,126,234,0.3); }
        .day-btn.completed { background: linear-gradient(135deg, #4ade80, #22c55e); border-color: #22c55e; color: white; }
        .day-btn.current { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #667eea; color: white; }
        .day-btn.locked { opacity: 0.4; cursor: not-allowed; }
        .day-number { font-size: 1.1rem; font-weight: 700; }
        .day-label { font-size: 0.65rem; margin-top: 2px; }
        .mode-selection {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
        }
        .mode-card {
            flex: 1;
            max-width: 180px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .mode-card:hover { border-color: #667eea; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(102,126,234,0.2); }
        .mode-card .icon { font-size: 2.5rem; margin-bottom: 8px; }
        .mode-card h3 { color: #333; margin-bottom: 5px; font-size: 1rem; }
        .mode-card p { color: #666; font-size: 0.8rem; }
        .hidden { display: none !important; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .progress-info { text-align: center; color: #667eea; font-weight: 600; margin-bottom: 10px; }
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 8px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.3s; }
        .word-card { text-align: center; padding: 15px; }
        .word-image {
            width: 100px; height: 100px; margin: 0 auto 15px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 10px 30px rgba(240,147,251,0.3);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .word-display { font-size: 2rem; color: #333; margin: 10px 0 5px; font-weight: 700; }
        .phonetic { color: #888; font-size: 1rem; margin-bottom: 15px; }
        .meaning { font-size: 1.2rem; color: #667eea; margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-radius: 10px; }
        .study-controls { display: flex; gap: 12px; justify-content: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .options { display: grid; gap: 10px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; padding: 14px 18px; border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: left; }
        .option:hover { background: #e9ecef; border-color: #667eea; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; }
        .option.disabled { pointer-events: none; }
        .result-screen { text-align: center; }
        .score-circle { width: 130px; height: 130px; margin: 15px auto; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 2.2rem; font-weight: 700; box-shadow: 0 10px 35px rgba(102,126,234,0.4); }
        .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .result-stat { background: #f8f9fa; padding: 12px; border-radius: 10px; }
        .result-stat .number { font-size: 1.4rem; font-weight: 700; color: #667eea; }
        .result-stat .label { color: #666; font-size: 0.8rem; }
        .wrong-words { margin-top: 20px; text-align: left; max-height: 200px; overflow-y: auto; }
        .word-item { background: #f8f9fa; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .word-item .emoji { font-size: 1.3rem; }
        .word-item .word { font-weight: 600; color: #333; }
        .word-item .phonetic { color: #888; font-size: 0.8rem; margin: 0; }
        @media (max-width: 600px) {
            .day-grid { grid-template-columns: repeat(5, 1fr); }
            .mode-selection { flex-direction: column; align-items: center; }
            .word-display { font-size: 1.6rem; }
            .result-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 30天小托福词汇挑战</h1>
            <p>每天50词 · 1500核心词汇</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-pill">📅 已完成: <span id="completedDays">0</span>/30</div>
            <div class="stat-pill">📝 已掌握: <span id="masteredWords">0</span>/1500</div>
            <div class="stat-pill">🔥 连续: <span id="streak">0</span>天</div>
        </div>
        
        <div class="card">
            <!-- 天数选择 -->
            <div id="daySelector">
                <div class="day-grid" id="dayGrid"></div>
                <div class="mode-selection hidden" id="modeSelection">
                    <div class="mode-card" onclick="startMode('study')">
                        <div class="icon">📖</div>
                        <h3>学习模式</h3>
                        <p>浏览单词+图示</p>
                    </div>
                    <div class="mode-card" onclick="startMode('quiz')">
                        <div class="icon">📝</div>
                        <h3>测验模式</h3>
                        <p>50题挑战</p>
                    </div>
                </div>
            </div>
            
            <!-- 学习/测验界面 -->
            <div id="quizScreen" class="hidden">
                <div class="quiz-header">
                    <h3>Day <span id="currentDay">1</span> - <span id="modeText">学习</span></h3>
                    <button class="back-btn" onclick="goBack()">↩ 返回</button>
                </div>
                <div class="progress-info">第 <span id="qNum">1</span> / <span id="qTotal">50</span> 词</div>
                <div class="progress-bar"><div class="progress-fill" id="progBar"></div></div>
                
                <div class="word-card">
                    <div class="word-image" id="wImg">🎯</div>
                    <div class="word-display" id="wWord">word</div>
                    <div class="phonetic" id="wPhonetic">/phonetic/</div>
                    <div class="meaning hidden" id="wMeaning">meaning</div>
                </div>
                
                <div class="study-controls" id="studyCtrl">
                    <button class="btn btn-secondary" onclick="showMean()">👁 显示释义</button>
                    <button class="btn btn-primary" onclick="next()">下一个 ➡️</button>
                </div>
                <div class="options hidden" id="quizOpts"></div>
            </div>
            
            <!-- 结果页 -->
            <div id="resultScreen" class="result-screen hidden">
                <h2>🎉 Day <span id="resDay">1</span> 完成!</h2>
                <div class="score-circle" id="scoreCir">0%</div>
                <div class="result-stats">
                    <div class="result-stat"><div class="number" id="corCnt">0</div><div class="label">正确</div></div>
                    <div class="result-stat"><div class="number" id="wrCnt">0</div><div class="label">错误</div></div>
                    <div class="result-stat"><div class="number" id="timeSpent">0:00</div><div class="label">用时</div></div>
                </div>
                <div class="wrong-words" id="wrWords"></div>
                <div style="margin-top:20px">
                    <button class="btn btn-primary" onclick="nextDay()">继续下一天 ➡️</button>
                    <button class="btn btn-secondary" onclick="goBack()">返回主页</button>
                </div>
            </div>
        </div>
    </div>

<script>
// 30天词汇数据（完整版应包含1500词）
const VOCAB_30D = {
    day1: [
        {w:"abandon",p:"/əˈbændən/",m:"放弃，抛弃",e:"🚶‍♂️💨"},
        {w:"ability",p:"/əˈbɪləti/",m:"能力，才能",e:"💪🧠"},
        {w:"absent",p:"/ˈæbsənt/",m:"缺席的",e:"❌🏫"},
        {w:"absolute",p:"/ˈæbsəluːt/",m:"绝对的",e:"💯"},
        {w:"absorb",p:"/əbˈzɔːrb/",m:"吸收",e:"🧽💧"},
        {w:"abstract",p:"/ˈæbstrækt/",m:"抽象的",e:"🎨🌀"},
        {w:"abundant",p:"/əˈbʌndənt/",m:"丰富的",e:"🍎🍊🍇"},
        {w:"academic",p:"/ˌækəˈdemɪk/",m:"学术的",e:"📚🎓"},
        {w:"accelerate",p:"/əkˈseləreɪt/",m:"加速",e:"🚀⚡"},
        {w:"access",p:"/ˈækses/",m:"进入，使用权",e:"🚪🔑"}
    ],
    // 其他天数数据...
};

// 生成更多模拟数据
for(let d=2; d<=30; d++) {
    VOCAB_30D['day'+d] = [];
    for(let i=0; i<50; i++) {
        VOCAB_30D['day'+d].push({
            w: `Day${d}_Word${i+1}`,
            p: '/fəˈnetɪk/',
            m: `第${d}天第${i+1}个单词释义`,
            e: ['🎯','📚','💡','🔥','⭐','🌟','💪','🧠','✨','🎓'][i%10]
        });
    }
}

// 应用状态
let state = {
    day: 1, mode: null, idx: 0, words: [],
    correct: 0, wrong: [], start: null,
    completed: JSON.parse(localStorage.getItem('tj_completed')||'[]'),
    streak: parseInt(localStorage.getItem('tj_streak')||'0')
};

// 初始化
function init() {
    renderDays();
    updateStats();
}

// 渲染天数网格
function renderDays() {
    const grid = document.getElementById('dayGrid');
    grid.innerHTML = '';
    for(let i=1; i<=30; i++) {
        const btn = document.createElement('div');
        btn.className = 'day-btn';
        const isComp = state.completed.includes(i);
        const nextDay = state.completed.length?Math.max(...state.completed)+1:1;
        
        if(isComp) { btn.classList.add('completed'); btn.innerHTML=`<div class="day-number">${i}</div><div class="day-label">✓</div>`; }
        else if(i===nextDay) { btn.classList.add('current'); btn.innerHTML=`<div class="day-number">${i}</div><div class="day-label">当前</div>`; }
        else if(i>nextDay) { btn.classList.add('locked'); btn.innerHTML=`<div class="day-number">${i}</div><div class="day-label">🔒</div>`; }
        else { btn.innerHTML=`<div class="day-number">${i}</div><div class="day-label">可学</div>`; }
        
        btn.onclick = ()=>selectDay(i);
        grid.appendChild(btn);
    }
}

// 更新统计
function updateStats() {
    document.getElementById('completedDays').textContent = state.completed.length;
    document.getElementById('masteredWords').textContent = state.completed.length*50;
    document.getElementById('streak').textContent = state.streak;
}

// 选择天数
function selectDay(day) {
    const nextDay = state.completed.length?Math.max(...state.completed)+1:1;
    if(day>nextDay) { alert('请先完成前面的天数！'); return; }
    state.day = day;
    document.getElementById('modeSelection').classList.remove('hidden');
    document.getElementById('modeSelection').scrollIntoView({behavior:'smooth'});
}

// 开始模式
function startMode(mode) {
    state.mode = mode;
    state.idx = 0;
    state.correct = 0;
    state.wrong = [];
    state.start = Date.now();
    state.words = VOCAB_30D['day'+state.day] || VOCAB_30D.day1;
    
    document.getElementById('daySelector').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    
    document.getElementById('currentDay').textContent = state.day;
    document.getElementById('modeText').textContent = mode==='study'?'学习模式':'测验模式';
    document.getElementById('qTotal').textContent = state.words.length;
    
    if(mode==='study') {
        document.getElementById('studyCtrl').classList.remove('hidden');
        document.getElementById('quizOpts').classList.add('hidden');
        document.getElementById('wMeaning').classList.add('hidden');
    } else {
        document.getElementById('studyCtrl').classList.add('hidden');
        document.getElementById('quizOpts').classList.remove('hidden');
    }
    showWord();
}

// 显示单词
function showWord() {
    const word = state.words[state.idx];
    const prog = ((state.idx+1)/state.words.length)*100;
    
    document.getElementById('progBar').style.width = prog+'%';
    document.getElementById('qNum').textContent = state.idx+1;
    document.getElementById('wImg').textContent = word.e;
    document.getElementById('wWord').textContent = word.w;
    document.getElementById('wPhonetic').textContent = word.p;
    document.getElementById('wMeaning').textContent = word.m;
    
    if(state.mode==='study') {
        document.getElementById('wMeaning').classList.add('hidden');
    } else {
        genOpts(word);
    }
}

// 显示释义
function showMean() {
    document.getElementById('wMeaning').classList.remove('hidden');
}

// 下一个
function next() {
    state.idx++;
    if(state.idx<state.words.length) showWord();
    else finish();
}

// 生成选项
function genOpts(word) {
    const opts = [word.m, "干扰项1", "干扰项2", "干扰项3"].sort(()=>Math.random()-0.5);
    const container = document.getElementById('quizOpts');
    container.innerHTML = '';
    opts.forEach(o=>{
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = o;
        btn.onclick = ()=>check(btn, o, word.m);
        container.appendChild(btn);
    });
}

// 检查答案
function check(btn, sel, cor) {
    document.querySelectorAll('.option').forEach(b=>b.classList.add('disabled'));
    const cur = state.words[state.idx];
    
    if(sel===cor) {
        btn.classList.add('correct');
        state.correct++;
    } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.option').forEach(b=>{if(b.textContent===cor)b.classList.add('correct')});
        state.wrong.push(cur);
    }
    
    setTimeout(()=>{
        state.idx++;
        if(state.idx<state.words.length) showWord();
        else finish();
    }, 1000);
}

// 完成
function finish() {
    if(!state.completed.includes(state.day)) {
        state.completed.push(state.day);
        localStorage.setItem('tj_completed', JSON.stringify(state.completed));
        updateStreak();
    }
    
    const time = Math.floor((Date.now()-state.start)/1000);
    const min = Math.floor(time/60), sec = time%60;
    
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    
    const pct = Math.round((state.correct/state.words.length)*100);
    document.getElementById('resDay').textContent = state.day;
    document.getElementById('scoreCir').textContent = pct+'%';
    document.getElementById('corCnt').textContent = state.correct;
    document.getElementById('wrCnt').textContent = state.wrong.length;
    document.getElementById('timeSpent').textContent = `${min}:${sec.toString().padStart(2,'0')}`;
    
    const wl = document.getElementById('wrWords');
    if(state.wrong.length) {
        wl.innerHTML = '<h4>📚 需要复习:</h4>' + state.wrong.map(w=>`
            <div class="word-item">
                <span class="emoji">${w.e}</span>
                <div>
                    <div class="word">${w.w} <span class="phonetic">${w.p}</span></div>
                </div>
            </div>
        `).join('');
    } else wl.innerHTML = '<p style="color:#4ade80">🎉 全对! 太棒了!</p>';
    
    updateStats();
}

// 更新连续天数
function updateStreak() {
    const today = new Date().toDateString();
    const last = localStorage.getItem('tj_lastDate');
    if(last) {
        const lastD = new Date(last);
        const diff = (new Date()-lastD)/(1000*60*60*24);
        if(diff<2) state.streak++;
        else state.streak=1;
    } else state.streak=1;
    localStorage.setItem('tj_streak', state.streak);
    localStorage.setItem('tj_lastDate', today);
}

// 下一天
function nextDay() {
    const next = state.day+1;
    if(next<=30) {
        state.day = next;
        startMode(state.mode);
    } else alert('恭喜完成30天挑战! 🎉');
}

// 返回
function goBack() {
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('daySelector').classList.remove('hidden');
    document.getElementById('modeSelection').classList.add('hidden');
    renderDays();
}

// 启动
init();
</script>
</body>
</html>
